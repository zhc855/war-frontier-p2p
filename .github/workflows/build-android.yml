name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Create www directory
      run: |
        mkdir -p www
        cp -r index.html css js favicon www/ || true

    - name: Install Cordova CLI globally
      run: npm install -g cordova@11.1.0

    - name: Install Cordova platforms
      run: |
        cordova platform add android@12.0.1
        cordova prepare android

    - name: Build Debug APK
      run: npx cordova build android --debug

    - name: Build Release APK
      run: npx cordova build android --release

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Get APK size
      run: |
        echo "Debug APK size:"
        du -h platforms/android/app/build/outputs/apk/debug/app-debug.apk
        echo "Release APK size:"
        du -h platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          platforms/android/app/build/outputs/apk/debug/app-debug.apk
          platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}